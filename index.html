<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Tracker Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg: #0d0d11;
            --card-bg: rgba(255, 255, 255, 0.03);
            --accent: #a3e635;
            --border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-muted: #888899;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: radial-gradient(circle at center, #14141c 0%, #0d0d11 100%);
        }

        /* Barre de recherche style V2 refined */
        .search-container {
            margin-bottom: 30px;
            display: flex;
            gap: 10px;
        }

        .search-input {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 14px 20px;
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            width: 280px;
            outline: none;
            transition: all 0.3s;
        }

        .search-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(163, 230, 53, 0.1);
        }

        .search-btn {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 0 20px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .search-btn:hover {
            transform: scale(1.05);
        }

        /* La fameuse Carte Profil V2 */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px;
            width: 400px;
            text-align: center;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
            display: none; /* Cachée au début, apparaît après recherche */
            animation: fadeIn 0.5s ease forward;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .avatar-wrapper {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 25px auto;
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 20px;
            border: 3px solid var(--accent);
            background-size: 200%;
            background-position: center top;
            box-shadow: 0 0 30px rgba(163, 230, 53, 0.25);
        }

        h1 {
            margin: 0 0 8px 0;
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .uuid {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 35px;
            font-family: monospace;
            letter-spacing: 0.5px;
        }

        /* Lignes d'informations */
        .stats-container {
            margin-bottom: 20px;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .stat-row:last-child {
            border-bottom: none;
        }

        .stat-label {
            color: var(--text-muted);
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .stat-value {
            font-weight: 600;
            color: #fff;
            font-size: 15px;
        }

        .stat-value.highlight {
            color: var(--accent);
        }

        .cape-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(163, 230, 53, 0.1);
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: bold;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="search-container">
        <input type="text" id="username" class="search-input" placeholder="Entrez un pseudo Minecraft...">
        <button onclick="trackPlayer()" class="search-btn"><i class="fa-solid fa-magnifying-glass"></i></button>
    </div>

    <div class="card" id="player-card">
        <div class="avatar-wrapper">
            <div class="avatar" id="player-avatar"></div>
        </div>
        <h1 id="player-crypto-name">Pseudo</h1>
        <div class="uuid" id="player-uuid">UUID</div>
        
        <div class="stats-container">
            <div class="stat-row">
                <div class="stat-label"><i class="fa-solid fa-clock"></i> Temps de jeu</div>
                <div class="stat-value highlight" id="player-time">0 min</div>
            </div>
            <div class="stat-row">
                <div class="stat-label"><i class="fa-solid fa-server"></i> Dernier Serveur</div>
                <div class="stat-value" id="player-server">Aucun</div>
            </div>
            <div class="stat-row">
                <div class="stat-label"><i class="fa-solid fa-calendar-day"></i> Vu pour la dernière fois</div>
                <div class="stat-value" id="player-last-login">Jamais</div>
            </div>
        </div>

        <div id="cape-area"></div>
    </div>

    <script>
        async function trackPlayer() {
            const pseudo = document.getElementById('username').value.trim();
            if(!pseudo) return;

            try {
                // Requête vers ton API Node.js
                const response = await fetch(`/api/player/${pseudo}`);
                if(!response.ok) throw new Error();
                const data = await response.json();

                // Injection des données dans le design V2
                document.getElementById('player-avatar').style.backgroundImage = `url('${data.skinUrl}')`;
                document.getElementById('player-crypto-name').innerText = data.pseudo;
                document.getElementById('player-uuid').innerText = `UUID: ${data.uuid}`;
                document.getElementById('player-time').innerText = `${data.stats.totalTime} min`;
                document.getElementById('player-server').innerText = data.stats.lastServer;
                document.getElementById('player-last-login').innerText = data.stats.lastLogin;

                // Gestion de la cape
                const capeArea = document.getElementById('cape-area');
                if(data.capeUrl) {
                    capeArea.innerHTML = `<div class="cape-badge"><i class="fa-solid fa-shield-halved"></i> Cape Alignée</div>`;
                } else {
                    capeArea.innerHTML = '';
                }

                // Rendre la carte visible avec l'animation
                document.getElementById('player-card').style.display = 'block';

            } catch (err) {
                alert("Joueur introuvable ou erreur de synchronisation avec l'API.");
            }
        }
    </script>
</body>
</html>
